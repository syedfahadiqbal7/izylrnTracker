# Alembic configuration for IzySafe.
# The DB URL is NOT set here — alembic/env.py injects settings.sync_database_url
# (psycopg2) so there is a single source of truth (.env) for the connection.

[alembic]
script_location = alembic
prepend_sys_path = .
# Migration filenames: 0001_xxxx, 0002_xxxx, ...
file_template = %%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
