# Admin panel edge: serves the SPA + reverse-proxies the API to the backend.
# Included inside the stock nginx http{} block, so limit_req_zone is valid here.

limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 12m;

    # Docker's embedded DNS — resolve the backend upstream at request time so nginx
    # starts even if the backend is briefly down and picks up new IPs after restarts.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend "backend:8000";

    # --- Security headers (SPA responses) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Enable once served over HTTPS (TLS here or at an upstream load balancer):
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml image/svg+xml;

    # --- Hashed static assets → long-lived immutable cache ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- API + webhooks (mounted under /api/v1) → backend ---
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://$backend;                 # full URI (/api/v1/...) preserved
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Backend liveness (ops convenience) ---
    location = /health {
        proxy_pass http://$backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
